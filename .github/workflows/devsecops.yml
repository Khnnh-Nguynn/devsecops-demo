name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── STAGE 1: BUILD ──────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest --tb=short || true

  # ── STAGE 2: SAST (SonarQube Cloud) ─────────────────
  sast:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ── STAGE 3: SCA (Snyk - kiểm tra thư viện) ─────────
  sca:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/python@master
        continue-on-error: true          # không block pipeline khi học
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  # ── STAGE 4: DAST (OWASP ZAP) ───────────────────────
  dast:
    needs: [sast, sca]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start app
        run: |
          pip install flask
          python src/app.py &
          sleep 5

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:5000"
          fail_action: false             # không block khi học

  # ── QUALITY GATE ────────────────────────────────────
  quality-gate:
    needs: [sast, sca, dast]
    runs-on: ubuntu-latest
    steps:
      - name: Quality Gate Check
        run: |
          echo "✅ All security scans completed!"
          echo "✅ Pipeline passed Quality Gate"